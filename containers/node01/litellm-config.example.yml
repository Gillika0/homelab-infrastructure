# =============================================================
# litellm-config.example.yml
# Copy to litellm-config.yml and add real keys via environment
# variables — never hardcode keys in this file
# =============================================================

model_list:

  # ── Fast inference — Groq ──────────────────────────────
  - model_name: llama-70b-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: llama-8b-fast
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  # ── Google Gemini ──────────────────────────────────────
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # ── OpenRouter fallback ────────────────────────────────
  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

  # ── TTS routing ───────────────────────────────────────
  - model_name: tts
    litellm_params:
      model: gemini/gemini-2.5-flash-native-audio-dialog
      api_key: os.environ/GEMINI_API_KEY

  - model_name: tts
    litellm_params:
      model: openrouter/qwen/qwen3-tts-flash
      api_key: os.environ/OPENROUTER_API_KEY

# ── Router settings ────────────────────────────────────
router_settings:
  routing_strategy: least-busy
  num_retries: 3
  timeout: 30
  fallbacks:
    - llama-70b-fast:
        - openrouter-fallback

# ── General settings ───────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false

litellm_settings:
  drop_params: true
  set_verbose: false
