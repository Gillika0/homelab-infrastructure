# =============================================================
# hosts.example.ini — Template for Ansible inventory
# Copy to hosts.ini, fill real values, encrypt with Vault:
#   ansible-vault encrypt hosts.ini
# NEVER commit hosts.ini — only this example template
# =============================================================

[all:vars]
ansible_user=YOUR_SSH_USER
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3

# ── On-premise nodes (Lenovo m910q) ──────────────────────
[lenovo]
node01 ansible_host=NODE01_TAILSCALE_OR_LAN_IP
node02 ansible_host=NODE02_TAILSCALE_OR_LAN_IP
node03 ansible_host=NODE03_TAILSCALE_OR_LAN_IP

# ── Cloud node ───────────────────────────────────────────
[cloud]
node04 ansible_host=NODE04_TAILSCALE_OR_PUBLIC_IP

# ── Groups ───────────────────────────────────────────────
[homelab:children]
lenovo
cloud

# ── Node-specific vars ───────────────────────────────────
[node01:vars]
node_role=orchestration
node_ram_gb=16

[node02:vars]
node_role=storage
node_ram_gb=8

[node03:vars]
node_role=media
node_ram_gb=8

[node04:vars]
node_role=cloud
node_ram_gb=24
ansible_user=YOUR_ORACLE_SSH_USER
